<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilterBar プロトタイプ — 案A vs 案B</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#fff4ee',
              100: '#ffe0cc',
              400: '#f57c3a',
              500: '#ec5b13',
              700: '#c94d0e',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; overflow: hidden; font-feature-settings: 'liga'; -webkit-font-feature-settings: 'liga'; }
    /* Popover animation */
    #popover-panel { transform-origin: top left; }
    #popover-panel.hidden { display: none; }
    /* Bottom sheet animation */
    .sheet-enter { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    /* Tab active underline */
    .tab-btn.active { border-bottom: 2px solid #ec5b13; color: #ec5b13; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- ===== Header ===== -->
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold"><span class="text-primary-500">有明</span>イベント</h1>
      <span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">Filter Prototype</span>
    </div>
    <span class="text-sm text-slate-500">4月5日(日)</span>
  </header>

  <!-- ===== Pattern Switch Tabs ===== -->
  <div class="bg-white border-b border-slate-200 flex">
    <button id="tab-a" onclick="switchTab('a')" class="tab-btn active flex-1 py-3 text-sm font-medium text-slate-600 border-b-2 border-primary-500 text-primary-500">
      案A: Popover ドロップダウン
    </button>
    <button id="tab-b" onclick="switchTab('b')" class="tab-btn flex-1 py-3 text-sm font-medium text-slate-600 border-b-2 border-transparent">
      案B: インライン展開
    </button>
  </div>

  <!-- ===== 案A: Popover ===== -->
  <div id="pattern-a">
    <!-- FilterBar A -->
    <div class="bg-[#f8f6f6] px-4 py-3 flex items-center gap-3 sticky top-[57px] z-20">
      <div class="relative">
        <button
          id="popover-trigger"
          onclick="toggleFilterPopover()"
          class="flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50"
        >
          <span class="material-symbols-outlined" style="font-size:16px">tune</span>
          絞り込み
          <span id="badge-a" class="hidden bg-primary-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">2</span>
        </button>

        <!-- Popover Panel -->
        <div
          id="popover-panel"
          class="hidden absolute left-0 top-full mt-2 w-[520px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-[0_8px_32px_rgba(15,23,42,0.16)] border border-slate-100 p-5 z-50"
        >
          <div class="mb-4">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">施設</p>
            <div class="flex flex-wrap gap-2">
              <button onclick="selectFacility(this, null)" class="chip chip-active shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-primary-500 text-white">すべて</button>
              <button onclick="selectFacility(this, '有明ガーデン')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">有明ガーデン</button>
              <button onclick="selectFacility(this, '東京ガーデンシアター')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">東京ガーデンシアター</button>
              <button onclick="selectFacility(this, '有明アリーナ')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">有明アリーナ</button>
              <button onclick="selectFacility(this, 'TOYOTA ARENA TOKYO')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">TOYOTA ARENA TOKYO</button>
              <button onclick="selectFacility(this, '東京ビッグサイト')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">東京ビッグサイト</button>
            </div>
          </div>
          <div>
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">カテゴリ</p>
            <div class="flex flex-wrap gap-2">
              <button onclick="selectCategory(this, null)" class="chip chip-active shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-primary-500 text-white">すべて</button>
              <button onclick="selectCategory(this, 'music')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">ミュージック</button>
              <button onclick="selectCategory(this, 'sports')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">スポーツ</button>
              <button onclick="selectCategory(this, 'exhibition')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">展示・展覧</button>
              <button onclick="selectCategory(this, 'kids')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">キッズ</button>
              <button onclick="selectCategory(this, 'food')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">フード</button>
              <button onclick="selectCategory(this, 'fashion')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">ファッション</button>
              <button onclick="selectCategory(this, 'anime')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">アニメ</button>
              <button onclick="selectCategory(this, 'other')" class="chip shrink-0 rounded-full px-3 py-1 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600 hover:bg-slate-50">その他</button>
            </div>
          </div>
        </div>
      </div>

      <span id="active-label-a" class="text-sm text-slate-500 truncate flex-1 hidden"></span>

      <div class="ml-auto">
        <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 text-slate-500 hover:text-primary-500 transition-colors cursor-pointer">
          <span class="material-symbols-outlined" style="font-size:18px">grid_view</span>
        </button>
      </div>
    </div>

    <!-- Click outside to close -->
    <div id="popover-backdrop" class="hidden fixed inset-0 z-40" onclick="closeFilterPopover()"></div>

    <!-- Content A -->
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="mb-3 flex items-center gap-2">
        <span class="text-base font-semibold text-slate-800">今日のイベント</span>
        <span class="bg-[#fff3ed] text-primary-500 text-sm font-medium rounded-full px-3 py-1">2026年4月5日(日)</span>
      </div>
      <div class="columns-2 lg:columns-3 gap-x-3" id="cards-a">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </div>

  <!-- ===== 案B: インライン展開 ===== -->
  <div id="pattern-b" class="hidden">
    <!-- FilterBar B -->
    <div class="bg-[#f8f6f6] sticky top-[57px] z-20">
      <!-- Row 1: 施設 -->
      <div class="px-4 pt-3 pb-1">
        <p class="text-xs font-semibold text-slate-400 mb-2">施設</p>
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
          <button onclick="selectFacilityB(this, null)" class="chip-b shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-primary-500 text-white">すべての施設</button>
          <button onclick="selectFacilityB(this, '有明ガーデン')" class="chip-b shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">有明ガーデン</button>
          <button onclick="selectFacilityB(this, '東京ガーデンシアター')" class="chip-b shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">東京ガーデンシアター</button>
          <button onclick="selectFacilityB(this, '有明アリーナ')" class="chip-b shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">有明アリーナ</button>
          <button onclick="selectFacilityB(this, 'TOYOTA ARENA TOKYO')" class="chip-b shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">TOYOTA ARENA TOKYO</button>
          <button onclick="selectFacilityB(this, '東京ビッグサイト')" class="chip-b shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">東京ビッグサイト</button>
        </div>
      </div>
      <!-- Row 2: カテゴリ -->
      <div class="px-4 pb-3">
        <p class="text-xs font-semibold text-slate-400 mb-2">カテゴリ</p>
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
          <button onclick="selectCategoryB(this, null)" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-primary-500 text-white">すべて</button>
          <button onclick="selectCategoryB(this, 'music')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">ミュージック</button>
          <button onclick="selectCategoryB(this, 'sports')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">スポーツ</button>
          <button onclick="selectCategoryB(this, 'exhibition')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">展示・展覧</button>
          <button onclick="selectCategoryB(this, 'kids')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">キッズ</button>
          <button onclick="selectCategoryB(this, 'food')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">フード</button>
          <button onclick="selectCategoryB(this, 'fashion')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">ファッション</button>
          <button onclick="selectCategoryB(this, 'anime')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">アニメ</button>
          <button onclick="selectCategoryB(this, 'other')" class="chip-b-cat shrink-0 rounded-full px-3 py-1.5 text-sm font-medium transition-colors cursor-pointer bg-white border border-slate-200 text-slate-600">その他</button>
        </div>
      </div>
      <div class="border-t border-slate-200 flex justify-end px-4 py-2">
        <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 text-slate-500 hover:text-primary-500 transition-colors cursor-pointer">
          <span class="material-symbols-outlined" style="font-size:18px">grid_view</span>
        </button>
      </div>
    </div>

    <!-- Content B -->
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="mb-3 flex items-center gap-2">
        <span class="text-base font-semibold text-slate-800">今日のイベント</span>
        <span class="bg-[#fff3ed] text-primary-500 text-sm font-medium rounded-full px-3 py-1">2026年4月5日(日)</span>
      </div>
      <div class="columns-2 lg:columns-3 gap-x-3" id="cards-b">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </div>

  <!-- ===== Dummy Mobile Bottom Sheet (案A のみ、モバイル幅時) ===== -->

  <script>
    // ---- Sample data ----
    const EVENTS = [
      { title: '家庭料理のテイクアウトサービス「マチルダ」', facility: '有明ガーデン', category: 'food', label: 'フード', congestion: '空いている', congestionClass: 'bg-emerald-500' },
      { title: '｜POP-UP｜下町カヌレとキルギスはちみつ販売', facility: '有明ガーデン', category: 'food', label: 'フード', congestion: '空いている', congestionClass: 'bg-emerald-500' },
      { title: 'April Dream × 有明ガーデン「夢の桜プロジェクト」', facility: '有明ガーデン', category: 'exhibition', label: '展示・展覧', congestion: '空いている', congestionClass: 'bg-emerald-500' },
      { title: 'JACK IN THE DONUTS', facility: '有明ガーデン', category: 'food', label: 'フード', congestion: '空いている', congestionClass: 'bg-emerald-500' },
      { title: 'フードトラック出店｜吉野家', facility: '有明ガーデン', category: 'food', label: 'フード', congestion: 'やや混雑', congestionClass: 'bg-amber-500' },
      { title: '遊んで食べてシリアル ハピモニ★ランド', facility: '有明ガーデン', category: 'kids', label: 'キッズ', congestion: 'やや混雑', congestionClass: 'bg-amber-500' },
      { title: 'ASIAN KUNG-FU GENERATION 30th Anniversary Concert', facility: '有明アリーナ', category: 'music', label: 'ミュージック', congestion: 'やや混雑', congestionClass: 'bg-amber-500' },
      { title: 'B.LEAGUE 第29節 アルバルク東京 vs 秋田ノーザンハピネッツ', facility: 'TOYOTA ARENA TOKYO', category: 'sports', label: 'スポーツ', congestion: 'やや混雑', congestionClass: 'bg-amber-500' },
      { title: '第15回 インターペット東京～人とペットの豊かな暮らしフェア～', facility: '東京ビッグサイト', category: 'exhibition', label: '展示・展覧', congestion: '空いている', congestionClass: 'bg-emerald-500' },
      { title: 'Designer\'s Gate 2026', facility: '東京ビッグサイト', category: 'exhibition', label: '展示・展覧', congestion: '混雑', congestionClass: 'bg-orange-500' },
      { title: 'Japan DX Week 春', facility: '東京ビッグサイト', category: 'exhibition', label: '展示・展覧', congestion: '非常に混雑', congestionClass: 'bg-rose-500' },
      { title: 'K-POP ファッションフェスタ', facility: '東京ガーデンシアター', category: 'fashion', label: 'ファッション', congestion: '混雑', congestionClass: 'bg-orange-500' },
    ]

    // BG colors per facility (gradient-like)
    const FAC_BG = {
      '有明ガーデン': 'bg-emerald-50',
      '東京ガーデンシアター': 'bg-violet-50',
      '有明アリーナ': 'bg-sky-50',
      'TOYOTA ARENA TOKYO': 'bg-orange-50',
      '東京ビッグサイト': 'bg-slate-100',
    }

    function makeCard(ev) {
      const bg = FAC_BG[ev.facility] || 'bg-slate-50'
      return `
        <div class="break-inside-avoid mb-3 bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100">
          <div class="relative h-32 ${bg} flex items-center justify-center">
            <span class="text-4xl opacity-20">🎪</span>
            <span class="absolute top-2 left-2 text-xs font-bold text-white ${ev.congestionClass} rounded-full px-2 py-0.5">${ev.congestion}</span>
          </div>
          <div class="p-3">
            <div class="flex flex-wrap gap-1 mb-1">
              <span class="text-xs text-slate-500 font-medium">${ev.facility}</span>
              <span class="text-xs font-medium text-primary-500">${ev.label}</span>
            </div>
            <p class="text-sm font-semibold text-slate-800 line-clamp-2 leading-snug">${ev.title}</p>
            <p class="text-xs text-slate-400 mt-1">📅 2026-04-05</p>
          </div>
        </div>`
    }

    function renderCards(containerId, facility, category) {
      const container = document.getElementById(containerId)
      const filtered = EVENTS.filter(ev =>
        (facility == null || ev.facility === facility) &&
        (category == null || ev.category === category)
      )
      if (filtered.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-sm col-span-full py-8 text-center">条件に合うイベントがありません</p>'
      } else {
        container.innerHTML = filtered.map(makeCard).join('')
      }
    }

    // Initialize cards
    renderCards('cards-a', null, null)
    renderCards('cards-b', null, null)

    // ---- Tab switch ----
    function switchTab(tab) {
      document.getElementById('pattern-a').classList.toggle('hidden', tab !== 'a')
      document.getElementById('pattern-b').classList.toggle('hidden', tab !== 'b')
      document.getElementById('tab-a').classList.toggle('active', tab === 'a')
      document.getElementById('tab-b').classList.toggle('active', tab === 'b')
      document.getElementById('tab-a').classList.toggle('border-primary-500', tab === 'a')
      document.getElementById('tab-a').classList.toggle('text-primary-500', tab === 'a')
      document.getElementById('tab-a').classList.toggle('border-transparent', tab !== 'a')
      document.getElementById('tab-a').classList.toggle('text-slate-600', tab !== 'a')
      document.getElementById('tab-b').classList.toggle('border-primary-500', tab === 'b')
      document.getElementById('tab-b').classList.toggle('text-primary-500', tab === 'b')
      document.getElementById('tab-b').classList.toggle('border-transparent', tab !== 'b')
      document.getElementById('tab-b').classList.toggle('text-slate-600', tab !== 'b')
    }

    // ---- Pattern A: Popover ----
    let popoverOpen = false
    let selectedFacilityA = null
    let selectedCategoryA = null

    function toggleFilterPopover() {
      popoverOpen ? closeFilterPopover() : openFilterPopover()
    }
    function openFilterPopover() {
      popoverOpen = true
      document.getElementById('popover-panel').classList.remove('hidden')
      document.getElementById('popover-backdrop').classList.remove('hidden')
    }
    function closeFilterPopover() {
      popoverOpen = false
      document.getElementById('popover-panel').classList.add('hidden')
      document.getElementById('popover-backdrop').classList.add('hidden')
    }

    function selectFacility(btn, val) {
      selectedFacilityA = val
      document.querySelectorAll('#popover-panel .chip').forEach(b => {
        const isActive = (val === null && b.getAttribute('onclick').includes('null')) ||
                         (val !== null && b.getAttribute('onclick').includes(`'${val}'`))
        b.className = b.className.replace(/bg-primary-500 text-white|bg-white border border-slate-200 text-slate-600 hover:bg-slate-50/g, '').trim()
        b.className += isActive ? ' bg-primary-500 text-white' : ' bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
      })
      updateBadgeA()
      renderCards('cards-a', selectedFacilityA, selectedCategoryA)
    }

    function selectCategory(btn, val) {
      selectedCategoryA = val
      document.querySelectorAll('#popover-panel .chip').forEach(b => {
        if (!b.getAttribute('onclick').includes('selectCategory')) return
        const isActive = (val === null && b.getAttribute('onclick').includes('null')) ||
                         (val !== null && b.getAttribute('onclick').includes(`'${val}'`))
        b.className = b.className.replace(/bg-primary-500 text-white|bg-white border border-slate-200 text-slate-600 hover:bg-slate-50/g, '').trim()
        b.className += isActive ? ' bg-primary-500 text-white' : ' bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
      })
      updateBadgeA()
      renderCards('cards-a', selectedFacilityA, selectedCategoryA)
    }

    function updateBadgeA() {
      const count = (selectedFacilityA !== null ? 1 : 0) + (selectedCategoryA !== null ? 1 : 0)
      const badge = document.getElementById('badge-a')
      const label = document.getElementById('active-label-a')
      const btn = document.getElementById('popover-trigger')
      if (count > 0) {
        badge.textContent = count
        badge.classList.remove('hidden')
        label.textContent = [selectedFacilityA, selectedCategoryA ? CATEGORY_NAME[selectedCategoryA] : null].filter(Boolean).join(' / ')
        label.classList.remove('hidden')
      } else {
        badge.classList.add('hidden')
        label.classList.add('hidden')
      }
    }

    const CATEGORY_NAME = { music: 'ミュージック', sports: 'スポーツ', exhibition: '展示・展覧', kids: 'キッズ', food: 'フード', fashion: 'ファッション', anime: 'アニメ', other: 'その他' }

    // ---- Pattern B: Inline ----
    let selectedFacilityB = null
    let selectedCategoryB = null

    function selectFacilityB(btn, val) {
      selectedFacilityB = val
      document.querySelectorAll('.chip-b').forEach(b => {
        const isActive = (val === null && b.getAttribute('onclick').includes('null')) ||
                         (val !== null && b.getAttribute('onclick').includes(`'${val}'`))
        b.className = b.className.replace(/bg-primary-500 text-white|bg-white border border-slate-200 text-slate-600/g, '').trim()
        b.className += isActive ? ' bg-primary-500 text-white' : ' bg-white border border-slate-200 text-slate-600'
      })
      renderCards('cards-b', selectedFacilityB, selectedCategoryB)
    }

    function selectCategoryB(btn, val) {
      selectedCategoryB = val
      document.querySelectorAll('.chip-b-cat').forEach(b => {
        const isActive = (val === null && b.getAttribute('onclick').includes('null')) ||
                         (val !== null && b.getAttribute('onclick').includes(`'${val}'`))
        b.className = b.className.replace(/bg-primary-500 text-white|bg-white border border-slate-200 text-slate-600/g, '').trim()
        b.className += isActive ? ' bg-primary-500 text-white' : ' bg-white border border-slate-200 text-slate-600'
      })
      renderCards('cards-b', selectedFacilityB, selectedCategoryB)
