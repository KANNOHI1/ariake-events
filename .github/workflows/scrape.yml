name: Scrape Events

on:
  schedule:
    # 毎日午前9時（JST）= UTC 0:00 に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm --filter scraper test

      - name: Install Playwright browsers
        run: pnpm --filter scraper exec playwright install --with-deps chromium

      - name: Run scraper
        run: pnpm --filter scraper start

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code packages/web/public/events.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/web/public/events.json
          git commit -m "chore: update events.json [skip ci]"
          git push

      - name: Build Next.js
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_BASE_PATH: /ariake-events

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/web/out
